<!doctype html>
<html>
  <head>
    <title>Event Delegation Example</title>
    <style>
      .box {
        border: 2px solid black;
        padding: 20px;
        margin: 20px;
      }

      button {
        margin: 5px;
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <h1>Event Delegation Example</h1>

    <!-- WITHOUT EVENT DELEGATION -->
    <div class="box">
      <h2>Without Event Delegation</h2>

      <button class="btn1">Button 1</button>
      <button class="btn1">Button 2</button>
      <button class="btn1">Button 3</button>

      <br /><br />

      <button id="addBtn1">Add New Button</button>
    </div>

    <!-- WITH EVENT DELEGATION -->
    <div class="box">
      <h2>With Event Delegation</h2>

      <div id="buttonContainer">
        <button class="btn2">Button A</button>
        <button class="btn2">Button B</button>
        <button class="btn2">Button C</button>
      </div>

      <br />

      <button id="addBtn2">Add New Button</button>
    </div>

    <script>
      // =====================================
      // WITHOUT EVENT DELEGATION
      // =====================================

      const buttons = document.querySelectorAll(".btn1");

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          console.log("Without delegation:", button.textContent);
          alert("Clicked: " + button.textContent);
        });
      });

      // Adding a new button dynamically
      document.getElementById("addBtn1").addEventListener("click", () => {
        const newButton = document.createElement("button");

        newButton.textContent = "New Button";
        newButton.className = "btn1";

        document.querySelector(".box").appendChild(newButton);

        console.log("New button added without listener");
      });

      // =====================================
      // WITH EVENT DELEGATION
      // =====================================

      const container = document.getElementById("buttonContainer");

      // One event listener on parent
      container.addEventListener("click", (event) => {
        if (event.target.classList.contains("btn2")) {
          console.log("With delegation:", event.target.textContent);

          alert("Clicked: " + event.target.textContent);
        }
      });

      // Adding new button dynamically
      document.getElementById("addBtn2").addEventListener("click", () => {
        const newButton = document.createElement("button");

        newButton.textContent = "New Dynamic Button";
        newButton.className = "btn2";

        container.appendChild(newButton);
      });
    </script>
  </body>
</html>
